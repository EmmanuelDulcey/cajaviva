server:
  port: 8080
  servlet:
    context-path: /v1

spring:
  application:
    name: CajaViva
  mvc:
    throw-exception-if-no-handler-found: true
  profiles:
    active: sqlserver

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    issuer: cajaviva
    audience: cajaviva-api
    access-ttl-minutes: 15
    refresh-ttl-days: 7
    signing-key: ${JWT_SIGNING_KEY:01234567890123456789012345678901}
  cookie:
    domain: ""
    secure: false
    same-site: Lax
    path: /

---

spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:mem:cajaviva;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: admin

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        bytecode:
          provider: none

  flyway:
    enabled: false

  web:
    resources:
      add-mappings: false

---

spring:
  config:
    activate:
      on-profile: sqlserver

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=CajaViva;encrypt=true;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: sa
    password: admin

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        bytecode:
          provider: none

  flyway:
    enabled: true

  web:
    resources:
      add-mappings: false

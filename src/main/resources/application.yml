server:
  port: 8080
   # para abrir el swagger en el localhost:  http://localhost:8080/v1/swagger-ui.html
  servlet:
    context-path: /v1

spring:
  application:
    name: CajaViva
  mvc:
    throw-exception-if-no-handler-found: true
  profiles:
    active: h2   # si quieren cambiar la base de datos a la que estamos usardo, 
                #solamente cambien el valor de este perfil a "sqlserver"

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false
  web:
    resources:
      add-mappings: false

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: sqlserver
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=CajaViva;encrypt=true;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: sa
    password: admin
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  web:
    resources:
      add-mappings: false

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ==============================
# Configuración de la base de datos H2 (en memoria)
# ==============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==============================
# Configuración JPA / Hibernate
# ==============================
# crea las tablas al iniciar y las borra al apagar
spring.jpa.hibernate.ddl-auto=create-drop

# mostrar las consultas SQL en consola
spring.jpa.show-sql=true

# dialecto para H2 (opcional, Hibernate lo detecta automáticamente)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ==============================
# Configuración Flyway
# ==============================
# desactivado porque no tienes acceso a la BD real
spring.flyway.enabled=false

# ==============================
# Configuración del servidor
# ==============================
# puerto por defecto
server.port=8080
